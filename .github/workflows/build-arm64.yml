name: Build ARM64 artifacts (Raspberry Pi)

# Builds every deployable on a NATIVE arm64 runner, so the Pi never has to build
# anything. This matters more than it sounds: Next 16 defaults to Turbopack, whose
# memory is allocated in native Rust — NODE_OPTIONS=--max-old-space-size cannot
# cap it, so a `next build` on a 4GB Pi is decided by the OOM killer, not by Node.
# Building here also keeps multi-GB build writes off the Pi's storage.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "web/**"
      - "admin/**"
      - "pos/**"
      - ".github/workflows/build-arm64.yml"

env:
  NODE_VERSION: "22"

  # CRITICAL: NEXT_PUBLIC_* values are INLINED INTO THE BUNDLE AT BUILD TIME.
  # Setting them in a .env.local on the Pi does nothing — the apps would ship with
  # lib/api.ts's fallback (http://localhost:3001/api/v1) baked in, and every call
  # from a user's browser would fail. For the static POS export there is no runtime
  # fix at all. They must be correct HERE.
  # Override per-repo via Settings -> Variables if the domain changes.
  NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://api.wonderland.lk/api/v1' }}
  NEXT_PUBLIC_WEB_URL: ${{ vars.NEXT_PUBLIC_WEB_URL || 'https://wonderland.lk' }}
  NEXT_PUBLIC_META_PIXEL_ID: ${{ vars.NEXT_PUBLIC_META_PIXEL_ID }}
  NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}

jobs:
  build:
    # Native arm64 — no QEMU emulation.
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Show baked-in API URL
        run: echo "Front-ends will be built against $NEXT_PUBLIC_API_URL"

      # ── Backend: dist + node_modules (incl. the arm64 Prisma engine) ──
      # NOTE: devDependencies are deliberately NOT pruned. The Pi needs the Prisma
      # CLI for `prisma migrate deploy` and ts-node for `prisma db seed`; both are
      # devDependencies, so pruning them silently breaks first-boot provisioning.
      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npx prisma generate          # emits libquery_engine-linux-arm64-openssl-3.0.x
          npm run build                # nest build == tsc, cheap

      - name: Package backend
        run: |
          mkdir -p out/api
          cp -r backend/dist backend/node_modules backend/package.json backend/prisma out/api/

      # ── web / admin: Next standalone bundles ──
      - name: Build web
        working-directory: web
        run: |
          npm ci
          npx next build

      - name: Build admin
        working-directory: admin
        run: |
          npm ci
          npx next build

      - name: Package web + admin
        run: |
          for app in web admin; do
            mkdir -p "out/$app"
            # standalone omits .next/static and public — they must be copied alongside.
            cp -r "$app/.next/standalone/." "out/$app/"
            mkdir -p "out/$app/.next"
            cp -r "$app/.next/static" "out/$app/.next/static"
            [ -d "$app/public" ] && cp -r "$app/public" "out/$app/public" || true
          done

      # ── POS: static export, no Node process on the Pi ──
      - name: Build pos (static export)
        working-directory: pos
        run: |
          npm ci
          npx next build

      - name: Package pos
        run: |
          mkdir -p out/pos
          cp -r pos/out/. out/pos/

      - name: Create deploy bundle
        run: tar -czf wonderland-arm64.tar.gz -C out .

      - uses: actions/upload-artifact@v4
        with:
          name: wonderland-arm64
          path: wonderland-arm64.tar.gz
          retention-days: 14
