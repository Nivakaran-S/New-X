# Evolution API (WhatsApp) — the ONLY component we run in Docker.
#
# Everything else (Postgres, Redis, Node apps, Caddy, cloudflared) runs natively
# under systemd, because Docker's daemon costs 45-70MB of RAM we can't spare and
# adds a storage layer between Postgres and the disk for no benefit.
#
# ⚠️ ARCHITECTURE: pin a v2.2.x tag. v1.8.7 and every v1.7.x tag are amd64-ONLY —
# on a Pi they fail with `exec format error` (or silently run under slow QEMU).
# Verify BEFORE deploying:
#     docker buildx imagetools inspect atendai/evolution-api:v2.2.3 | grep arm64
#
# It reuses the Postgres and Redis already running on the host.

services:
  evolution-api:
    image: atendai/evolution-api:v2.2.3
    container_name: healplace-evolution
    restart: unless-stopped
    # Hard cap: one WhatsApp instance holds its full session state in memory.
    mem_limit: 350m
    memswap_limit: 350m
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SERVER_URL: https://wa.healplace.lk
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}

      # Reuse the host's data services (host.docker.internal -> host-gateway below)
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: ${EVOLUTION_DATABASE_URL}
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: ${EVOLUTION_REDIS_URL}
      CACHE_REDIS_PREFIX_KEY: evolution

      # Point the bot at the HealPlace webhook.
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: https://api.healplace.lk/api/v1/whatsapp/webhook
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"

      # No bundled arm64 Chromium — use the system one if a feature needs Puppeteer.
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium

      LOG_LEVEL: ERROR
    volumes:
      - evolution_instances:/evolution/instances
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  evolution_instances:
