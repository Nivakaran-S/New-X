# /etc/systemd/system/postgresql@.service.d/override.conf
#
# Postgres has the largest RSS on the box, which makes it the OOM killer's
# favourite victim — exactly the wrong outcome. Make it the last thing reaped.
#
#   sudo mkdir -p /etc/systemd/system/postgresql@.service.d
#   sudo cp postgresql-override.conf /etc/systemd/system/postgresql@.service.d/override.conf
#   sudo systemctl daemon-reload && sudo systemctl restart postgresql

[Service]
OOMScoreAdjust=-900
