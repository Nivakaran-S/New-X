# Cloudflare Tunnel — /etc/cloudflared/config.yml
#
# cloudflared dials OUT to Cloudflare's edge, so this works behind CGNAT (which
# SLT/Dialog residential lines commonly use). No port forwarding, no DDNS, no
# inbound ports, and the home IP is never exposed.
#
# All four hostnames point at Caddy, which routes on the Host header.

tunnel: REPLACE_WITH_TUNNEL_ID
credentials-file: /etc/cloudflared/REPLACE_WITH_TUNNEL_ID.json

# Keep the tunnel warm and resilient on a home uplink.
originRequest:
  connectTimeout: 30s
  # Socket.io's default heartbeat (25s ping) keeps this well under the idle cap.
  tcpKeepAlive: 30s
  noHappyEyeballs: true

ingress:
  - hostname: wonderland.lk
    service: http://localhost:8080
  - hostname: www.wonderland.lk
    service: http://localhost:8080
  - hostname: api.wonderland.lk
    service: http://localhost:8080
  - hostname: admin.wonderland.lk
    service: http://localhost:8080
  - hostname: pos.wonderland.lk
    service: http://localhost:8080

  # Required catch-all.
  - service: http_status:404
