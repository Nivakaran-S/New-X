# PostgreSQL 16 tuning — Raspberry Pi 4B (4GB), PGDATA on the USB3 SSD.
# Drop into /etc/postgresql/16/main/conf.d/ and restart.
#
# IMPORTANT: initialise the cluster with `initdb --data-checksums` (or run
# `pg_checksums --enable` offline). Without checksums, a silently-corrupted page
# from failing flash is served to the POS as if it were real data.

# ── Memory ───────────────────────────────────────────────────────────────
# ~20% of usable RAM. This box is NOT a dedicated DB server: the API, web and
# admin Node processes all contend for the same page cache.
shared_buffers = 512MB
# Deliberately NOT the textbook 75% — the OS cache here is shared with 3+ Node
# processes, and lying to the planner makes it pick index scans that then miss
# cache and hit the disk.
effective_cache_size = 1536MB
work_mem = 4MB
maintenance_work_mem = 128MB
autovacuum_work_mem = 64MB
temp_buffers = 8MB
wal_buffers = 16MB

# Each connection is a forked process — this is the main memory sink. Cap the
# app pools instead of raising this (Prisma: ?connection_limit=5).
max_connections = 40

# ── Parallelism (4 cores, shared box) ────────────────────────────────────
max_worker_processes = 4
max_parallel_workers = 2
max_parallel_workers_per_gather = 1
max_parallel_maintenance_workers = 1

# ── I/O planner costs (values below assume an SSD) ───────────────────────
random_page_cost = 1.1
seq_page_cost = 1.0
effective_io_concurrency = 200
# If you are ever forced back onto a microSD, use instead:
#   random_page_cost = 3.0
#   effective_io_concurrency = 1

# ── Durability & write reduction ─────────────────────────────────────────
# SAFE: on a crash you lose at most a fraction of a second of already-acked
# commits. It never corrupts the cluster. Big win on write latency.
synchronous_commit = off

# NEVER turn these off on flash storage. full_page_writes is the torn-page
# protection that makes power loss survivable.
fsync = on
full_page_writes = on

# The highest-leverage wear/latency reduction available: a short checkpoint
# interval forces a full 8KB page image into WAL on the first write to any page
# after each checkpoint. Widening it collapses that write amplification.
checkpoint_timeout = 30min
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 512MB
wal_compression = zstd
wal_level = replica

bgwriter_delay = 200ms
bgwriter_lru_maxpages = 100

# ── Autovacuum: smooth the I/O rather than letting it burst ──────────────
autovacuum = on
autovacuum_naptime = 2min
autovacuum_vacuum_cost_delay = 10ms
autovacuum_vacuum_cost_limit = 200

# ── Logging: do not write a line per query to flash ──────────────────────
log_statement = 'none'
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = off
log_disconnections = off
