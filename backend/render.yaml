##############################################################
# HealPlace — Render Infrastructure Blueprint
# Docs: https://render.com/docs/blueprint-spec
# Deploy: connect repo on render.com → "New Blueprint Instance"
##############################################################

services:
  # ── API (NestJS) ─────────────────────────────────────────
  - type: web
    name: healplace-api
    runtime: node
    region: singapore         # closest to Sri Lanka
    plan: free
    rootDir: backend
    buildCommand: >
      npm install &&
      npx prisma generate &&
      npm run build
    startCommand: >
      npx prisma migrate deploy &&
      node dist/main.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production

      # ── Database (auto-linked to Render Postgres below) ──
      - key: DATABASE_URL
        fromDatabase:
          name: healplace-db
          property: connectionString

      # ── Set these manually in the Render dashboard ───────
      - key: REDIS_URL
        sync: false    # Upstash Redis — rediss://:token@host:6379

      - key: MEILI_URL
        sync: false    # https://your-project.meilisearch.io

      - key: MEILI_MASTER_KEY
        sync: false

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_REFRESH_SECRET
        generateValue: true

      - key: JWT_EXPIRES_IN
        value: 15m

      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d

      - key: WEB_URL
        sync: false    # https://healplace.vercel.app

      - key: POS_URL
        sync: false    # https://healplace-pos.vercel.app

      - key: ADMIN_URL
        sync: false    # https://healplace-admin.vercel.app

      - key: R2_ACCOUNT_ID
        sync: false

      - key: R2_ACCESS_KEY_ID
        sync: false

      - key: R2_SECRET_ACCESS_KEY
        sync: false

      - key: R2_BUCKET_NAME
        value: healplace-uploads

      - key: R2_PUBLIC_URL
        sync: false    # https://uploads.healplace.lk

      - key: RESEND_API_KEY
        sync: false

      - key: EMAIL_FROM
        value: "HealPlace <noreply@healplace.lk>"

      - key: SHOP_LAT
        value: "6.9349"

      - key: SHOP_LNG
        value: "79.8560"

      - key: SHOP_ADDRESS
        value: "Pettah, Colombo 11, Sri Lanka"

# ── PostgreSQL ────────────────────────────────────────────
databases:
  - name: healplace-db
    databaseName: healplace
    user: healplace
    plan: free
    region: singapore
    # ⚠️  Render free PostgreSQL expires after 90 days.
    # Upgrade to Starter ($7/mo) or export & reimport before expiry.
