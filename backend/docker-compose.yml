version: '3.9'

services:
  # ── PostgreSQL ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: healplace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-healplace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-healplace_dev}
      POSTGRES_DB:       ${POSTGRES_DB:-healplace}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-healplace}']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: healplace-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-healplace_dev}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-healplace_dev}', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Meilisearch ────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: healplace-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-healplace_meili_dev_key}
      MEILI_ENV: development
    ports:
      - '7700:7700'
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:7700/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Evolution API (WhatsApp) ───────────────────
  # NOTE: Start this separately when ready for Phase 3
  # evolution-api:
  #   image: atendai/evolution-api:latest
  #   container_name: healplace-evolution
  #   restart: unless-stopped
  #   ports:
  #     - '8080:8080'
  #   environment:
  #     SERVER_URL: http://localhost:8080
  #     AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
  #     DATABASE_PROVIDER: postgresql
  #     DATABASE_CONNECTION_URI: ${DATABASE_URL}
  #     CACHE_REDIS_URI: redis://:${REDIS_PASSWORD:-healplace_dev}@redis:6379
  #   depends_on:
  #     postgres: { condition: service_healthy }
  #     redis:    { condition: service_healthy }
  #   volumes:
  #     - evolution_instances:/evolution/instances

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  # evolution_instances:
