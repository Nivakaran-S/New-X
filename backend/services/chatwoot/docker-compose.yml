version: '3.9'

# Chatwoot — Customer Support Chat Platform
# Standalone deployment for HealPlace
# Docs: https://www.chatwoot.com/docs/self-hosted/deployment/docker

services:
  # ── PostgreSQL (Chatwoot's own instance) ─────────────────────────
  chatwoot-postgres:
    image: postgres:15-alpine
    container_name: healplace-chatwoot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatwoot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-chatwoot_production}
    volumes:
      - chatwoot_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-chatwoot}']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────
  chatwoot-redis:
    image: redis:7-alpine
    container_name: healplace-chatwoot-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-chatwoot_dev}
    volumes:
      - chatwoot_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-chatwoot_dev}', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Chatwoot Rails App ────────────────────────────────────────────
  chatwoot-app:
    image: chatwoot/chatwoot:latest
    container_name: healplace-chatwoot-app
    restart: unless-stopped
    depends_on:
      chatwoot-postgres: { condition: service_healthy }
      chatwoot-redis:    { condition: service_healthy }
    ports:
      - '3000:3000'
    environment:
      # Security
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?SECRET_KEY_BASE is required}

      # URLs
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}

      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-chatwoot}:${POSTGRES_PASSWORD}@chatwoot-postgres:5432/${POSTGRES_DB:-chatwoot_production}

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-chatwoot_dev}@chatwoot-redis:6379

      # Email (optional — configure for notifications)
      MAILER_SENDER_EMAIL: ${MAILER_SENDER_EMAIL:-noreply@healplace.com}
      SMTP_DOMAIN: ${SMTP_DOMAIN:-healplace.com}
      SMTP_ADDRESS: ${SMTP_ADDRESS:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_AUTHENTICATION: ${SMTP_AUTHENTICATION:-plain}
      SMTP_ENABLE_STARTTLS_AUTO: true

      # Storage
      ACTIVE_STORAGE_SERVICE: local
      RAILS_ENV: production
      NODE_ENV: production
      INSTALLATION_NAME: HealPlace
      LOG_LEVEL: info
    volumes:
      - chatwoot_storage:/app/storage
    entrypoint: docker/entrypoints/rails.sh
    command: bundle exec rails s -p 3000 -b 0.0.0.0

  # ── Chatwoot Sidekiq Worker ───────────────────────────────────────
  chatwoot-worker:
    image: chatwoot/chatwoot:latest
    container_name: healplace-chatwoot-worker
    restart: unless-stopped
    depends_on:
      chatwoot-postgres: { condition: service_healthy }
      chatwoot-redis:    { condition: service_healthy }
    environment:
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-chatwoot}:${POSTGRES_PASSWORD}@chatwoot-postgres:5432/${POSTGRES_DB:-chatwoot_production}
      REDIS_URL: redis://:${REDIS_PASSWORD:-chatwoot_dev}@chatwoot-redis:6379
      MAILER_SENDER_EMAIL: ${MAILER_SENDER_EMAIL:-noreply@healplace.com}
      SMTP_DOMAIN: ${SMTP_DOMAIN:-healplace.com}
      SMTP_ADDRESS: ${SMTP_ADDRESS:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_AUTHENTICATION: ${SMTP_AUTHENTICATION:-plain}
      SMTP_ENABLE_STARTTLS_AUTO: true
      ACTIVE_STORAGE_SERVICE: local
      RAILS_ENV: production
      NODE_ENV: production
    volumes:
      - chatwoot_storage:/app/storage
    entrypoint: docker/entrypoints/rails.sh
    command: bundle exec sidekiq -C config/sidekiq.yml

volumes:
  chatwoot_postgres:
    name: healplace_chatwoot_postgres
  chatwoot_redis:
    name: healplace_chatwoot_redis
  chatwoot_storage:
    name: healplace_chatwoot_storage
